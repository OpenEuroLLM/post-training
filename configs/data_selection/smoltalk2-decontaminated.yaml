method: sft
backend: trl
run_name: null
offline: true
container: null

model:
  name_or_path: "allenai/Olmo-3-1025-7B"
  attn_implementation: "flash_attention_3"
  dtype: "bfloat16"

training:
  max_steps: 1
  num_training_samples: null
  num_training_tokens: null
  learning_rate: 8.0e-5
  lr_scheduler_type: "linear"
  lr_scheduler_kwargs: null
  warmup_steps: 0.03
  weight_decay: 0.0
  adam_beta1: 0.9
  adam_beta2: 0.95
  effective_batch_size: 32
  per_device_train_batch_size: 2
  gradient_checkpointing: true
  use_liger_kernel: true
  bf16: true
  seed: 42

sft:
  max_seq_length: 32768
  packing: true

data:
  chat_template: "olmo3-instruct-sft"
  num_proc: null
  seed: 42
  datasets:
    - name: "smoltalk2__Mid__Llama_Nemotron_Post_Training_Dataset_reasoning_r1"
