method: sft
backend: trl
run_name: null
offline: true
container: null

model:
  name_or_path: "allenai/Olmo-3-1025-7B"
  attn_implementation: "flash_attention_3"
  dtype: "bfloat16"

training:
  max_steps: 1
  num_training_samples: null
  num_training_tokens: null
  learning_rate: 8.0e-5
  lr_scheduler_type: "linear"
  lr_scheduler_kwargs: null
  warmup_steps: 0.03
  weight_decay: 0.0
  adam_beta1: 0.9
  adam_beta2: 0.95
  effective_batch_size: 32
  per_device_train_batch_size: 2
  gradient_checkpointing: true
  use_liger_kernel: true
  bf16: true
  seed: 42

sft:
  max_seq_length: 32768
  packing: true

data:
  chat_template: "olmo3-instruct-sft"
  num_proc: null
  seed: 42
  datasets:
    - name: "open_perfectblend__default__train"
      path: "openeurollm/open-perfectblend-decontaminated"
      subset: "default"
      split: "train"
      weight: 1.0
      transform: "perfectblend"

deepspeed:
  config_path: "configs/deepspeed/zero2.yaml"

logging:
  report_to:
    - "wandb"
    - "tensorboard"
  wandb_project: "sft-training"
  logging_steps: 1
  include_num_input_tokens_seen: "non_padding"

slurm:
  account: "reformo"
  partition: "booster"
  num_nodes: 1
  gpus_per_node: 4
  cpus_per_task: 32
  wall_time: "02:00:00"
  job_name: "sft-training"
  signal_time_seconds: 300
  max_failures: 3
