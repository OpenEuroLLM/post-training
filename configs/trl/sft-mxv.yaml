# ============================================================================
# SFT — MixtureVitae 1.7B
# ============================================================================

method: sft
backend: trl
run_name: null
offline: true

# -- Container ---------------------------------------------------------------
container:
  image: /e/data1/datasets/playground/mmlaion/shared/oellm_shared_evals/trl-jupiter-v2.sif
  bind_mounts:
    - /e/project1/jureap59/raj3:/e/project1/jureap59/raj3
    - /e/scratch/jureap59/raj3:/e/scratch/jureap59/raj3
    - /e/data1/datasets/playground/mmlaion/shared/oellm_shared_evals:/e/data1/datasets/playground/mmlaion/shared/oellm_shared_evals
  env_file: env/jupiter.env

# -- Model -------------------------------------------------------------------
model:
  name_or_path: "ontocord/1.7b-MixtureVitae-300BT-v1-decontaminated"
  attn_implementation: "flash_attention_2"
  dtype: "bfloat16"
  trust_remote_code: true

# -- Training hyper-parameters -----------------------------------------------
training:
  num_train_epochs: 2
  # max_steps: 10                            # uncomment for a quick debug run

  learning_rate: 5.0e-6
  effective_batch_size: 128
  per_device_train_batch_size: 16
  warmup_ratio: 0.03
  lr_scheduler_type: "linear"
  gradient_checkpointing: true
  bf16: true
  seed: 42
  use_liger_kernel: false

# -- SFT method parameters ---------------------------------------------------
sft:
  max_seq_length: 4096
  packing: false
  dataset_num_proc: 32
  remove_unused_columns: true
  dataset_kwargs:
    add_special_tokens: false
    append_concat_token: false

# -- Checkpointing -----------------------------------------------------------
checkpointing:
  save_steps: 200
  save_total_limit: 2

# -- Data mix ----------------------------------------------------------------
data:
  chat_template: "tulu3"
  num_proc: null
  additional_special_tokens:
    - "<|system|>"
    - "<|user|>"
    - "<|assistant|>"
  datasets:
    - name: "tulu_3_sft_mixture_decontaminated"
      path: "ali-elganzory/tulu-3-sft-mixture-decontaminated"
      split: "train"
      weight: 1.0
      transform: null

# -- DeepSpeed ---------------------------------------------------------------
deepspeed:
  config_path: "configs/deepspeed/zero2.yaml"

# -- Accelerate launch flags -------------------------------------------------
accelerate:
  mixed_precision: "bf16"
  use_deepspeed: true
  deepspeed_multinode_launcher: "standard"
  same_network: true
  rdzv_backend: "static"

# -- Logging & tracking ------------------------------------------------------
logging:
  report_to:
    - "wandb"
  wandb_project: "sft-mxv"
  logging_steps: 10

# -- SLURM -------------------------------------------------------------------
slurm:
  partition: "booster"
  account: "reformo"
  num_nodes: 2
  gpus_per_node: 4
  cpus_per_task: 32
  wall_time: "12:00:00"
  job_name: "sft-mxv"
  signal_time_seconds: 90
  max_failures: 10

# -- Debug mode --------------------------------------------------------------
debug:
  enabled: false
  override_existing: false

# -- Output paths ------------------------------------------------------------
paths:
  output_base: "outputs"
  debug_base: "outputs/debug"
