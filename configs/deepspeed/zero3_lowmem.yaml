# ============================================================================
# DeepSpeed ZeRO Stage 3 — reduced-buffer variant for 32B × 32k OOM
# ============================================================================
# Identical to zero3.yaml except the all-gather / live-parameter buffers are
# shrunk so that peak GPU memory during prefetch fits within GH200 96 GB HBM.
#
# Changes vs zero3.yaml:
#   stage3_prefetch_bucket_size      500 MB → 50 MB
#   stage3_max_live_parameters         1 B → 200 M
#   stage3_max_reuse_distance          1 B → 200 M
#
# Trade-off: slightly more all-gather round-trips → small throughput penalty,
# but the run should no longer OOM at seq_len=32768 with pbs=1.
# ============================================================================

bf16:
  enabled: true

zero_optimization:
  stage: 3
  overlap_comm: true
  contiguous_gradients: true
  reduce_scatter: true
  stage3_prefetch_bucket_size: 50000000
  stage3_param_persistence_threshold: 1000000
  stage3_max_live_parameters: 200000000
  stage3_max_reuse_distance: 200000000
  stage3_gather_16bit_weights_on_model_save: true

gradient_clipping: 1.0

train_micro_batch_size_per_gpu: "auto"
gradient_accumulation_steps: "auto"
train_batch_size: "auto"

optimizer:
  type: AdamW
  params:
    lr: "auto"
    betas: "auto"
    eps: "auto"
    weight_decay: "auto"
